<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrinhoColetivo - Mercados</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style-main.css">
    <link rel="stylesheet" href="style-mercados.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="./logos/branca sem fundo.png" alt="Logo CarrinhoColetivo">
                <h1>CarrinhoColetivo</h1>
            </div>
            <div class="user-actions">
                <a href="perfil.html" class="badge-pontos" id="perfil-usuario" style="text-decoration: none; cursor: pointer; transition: 0.2s;">
                    <i class="ph ph-user"></i> Carregando...
                </a>
            </div>
        </div>  
    </header>

    <main class="container">
        <nav class="nav-tabs">
            <a href="tela-principal.html" class="tab"><i class="ph ph-house"></i> Início</a>
            <a href="listas.html" class="tab"><i class="ph ph-list-checks"></i> Listas</a>
            <a href="mercados.html" class="tab active"><i class="ph ph-storefront"></i> Mercados</a>
        </nav>
        
        <div class="card destaque" style="margin-bottom: 20px;">
            <h2 class="card-title" style="margin-bottom: 10px;"><i class="ph ph-list-checks"></i> Qual lista vamos comparar?</h2>
            <select id="seletor-listas-mercado" class="input-customizado" style="font-weight: bold; background-color: white;" onchange="carregarComparacao()">
                <option value="">Carregando suas listas...</option>
            </select>
        </div>
        
        <!-- Modal de Sugestão -->
        <div id="modalSugestao" class="modal">
            <div class="modal-content">
                <h3>Sugerir Estabelecimento</h3>
                <input type="text" id="sugestaoNome" placeholder="Nome do Mercado" class="input-customizado" style="margin-bottom:10px;">
                <input type="text" id="sugestaoEndereco" placeholder="Endereço aproximado" class="input-customizado" style="margin-bottom:10px;">
                <button class="btn-customizado" style="width:100%" onclick="enviarSugestao()">Enviar Sugestão</button>
                <button class="btn-secundario" style="width:100%; margin-top:5px;" onclick="document.getElementById('modalSugestao').style.display='none'">Fechar</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title"><i class="ph ph-map-pin"></i> Minha Localização</h2>
            
            <div class="localizacao-grid">
                <div class="localizacao-inputs">
                    <button onclick="obterLocalizacao()" class="btn-customizado" style="max-width: 250px;">
                        <i class="ph ph-crosshair"></i> Usar GPS
                    </button>
                    <div style="display: flex; gap: 10px; flex: 1;">
                        <input type="text" id="enderecoManual" placeholder="Ou digite seu endereço..." class="input-customizado">
                        <button onclick="buscarPorEndereco()" class="btn-customizado-small">Buscar</button>
                    </div>
                    <div id="map" style="height: 300px; width: 100%; border-radius: 12px; margin-bottom: 20px;"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="ordenacao-container">
                <div class="ordenacao-botoes">
                    <button class="btn-ordenacao active" data-ordem="preco" onclick="ordenarMercados('preco')">
                        <i class="ph ph-coin"></i> Por Preço
                    </button>
                    <button class="btn-ordenacao" data-ordem="distancia" onclick="ordenarMercados('distancia')">
                        <i class="ph ph-navigation-arrow"></i> Por Distância
                    </button>
                </div>
                <div class="filtro-container">
                    <input type="text" id="filtroMercado" placeholder="Buscar mercado..." class="input-customizado">
                </div>
            </div>
            
        </div>
        
        

        <!-- LISTA DE MERCADOS VAZIA PARA O JS INJETAR -->
        <div class="grid-2colunas" id="listaMercadosContainer">
             <!-- O FETCH VAI DESENHAR OS CARDS AQUI -->
        </div>
        <div class="card destaque">
            <h2 class="card-title">Não achou o mercado que procurava?</h2>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn-secundario" onclick="document.getElementById('modalSugestao').style.display='flex'">+ Sugerir Mercado</button>
            </div>
        </div>
        

    </main>

    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-mercados.js"></script>
</body>
</html>
