<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrinhoColetivo - Início</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style-main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="./logos/branca sem fundo.png" alt="Logo CarrinhoColetivo">
                <h1>CarrinhoColetivo</h1>
            </div>
            <div class="user-actions">
                <span class="badge-pontos" id="perfil-usuario">👤 Carregando...</span>
                <a href="#" id="btn-sair" class="btn-sair">Sair</a>
            </div>
        </div>  
    </header>

    <main class="container">
        <section class="card landing-card">
            <h2 class="landing-title">Bem-vindo(a) ao CarrinhoColetivo!</h2>
            
            <p class="subtitle landing-subtitle">
                Você está autenticado com o e-mail: <strong id="email-display" class="landing-email"></strong>
            </p>

            <hr class="divisor">

            <!-- ÁREA DO LEITOR DE CÓDIGO DE BARRAS -->
            <h3 style="color: var(--roxo-principal); margin-bottom: 15px;">Leitor de Código de Barras</h3>
            
            <button id="btn-iniciar-leitor" class="btn-customizado">Começar a Escanear</button>
            
            <!-- Controles extras (Escolher câmera e Cancelar) -->
            <div id="controles-camera" style="display: none; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px;">
                <select id="lista-cameras" class="input-customizado"></select>
                <button id="btn-parar-leitor" class="btn-secundario">Parar Leitor</button>
            </div>
            
            <div id="leitor-camera" class="video-escondido"></div>
            
            <div style="margin-top: 20px; padding: 15px; background: var(--fundo-tela); border-radius: 8px;">
                <p>Resultado da Leitura:</p>
                <h2 id="resultado-leitura" style="color: var(--texto-escuro); margin-top: 10px;">Aguardando...</h2>
            </div>
            
        </section>
    </main>

    
    <div class="xiu"><a href="./logos/logo-secreta.jpeg"><p>xiu</p></a></div>
    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-tela-principal.js"></script>
    <!-- Importando a biblioteca Html5Qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</body>
</html>
