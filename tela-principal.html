<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrinhoColetivo - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style-main.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="./logos/branca sem fundo.png" alt="Logo CarrinhoColetivo">
                <h1>CarrinhoColetivo</h1>
            </div>
            <div class="user-actions">
                <a href="perfil.html" class="badge-pontos" id="perfil-usuario" style="text-decoration: none; cursor: pointer; transition: 0.2s;">
                    <i class="ph ph-user"></i> Carregando...
                </a>
            </div>
        </div>  
    </header>

    <main class="container">
        <nav class="nav-tabs">
            <a href="tela-principal.html" class="tab active"><i class="ph ph-house"></i> Início</a>
            <a href="listas.html" class="tab"><i class="ph ph-list-checks"></i> Listas</a>
            <a href="mercados.html" class="tab"><i class="ph ph-storefront"></i> Mercados</a>
        </nav>

        <section class="card landing-card">
            <h2 class="landing-title">Bem-vindo(a) de volta!</h2>
            <p class="subtitle landing-subtitle">
                O que vamos planejar hoje?
            </p>
            <hr class="divisor">
            
            <div class="grid-2colunas" style="margin-top: 20px;">
                <div class="card" style="text-align: center; cursor: pointer;" onclick="window.location.href='listas.html'">
                    <i class="ph ph-shopping-cart" style="font-size: 40px; color: var(--roxo-principal);"></i>
                    <h3>Criar Nova Lista</h3>
                    <p style="font-size: 13px; color: var(--texto-cinza);">Organize suas compras</p>
                </div>
                
                <div class="card" style="text-align: center; cursor: pointer;" onclick="window.location.href='mercados.html'">
                    <i class="ph ph-map-pin" style="font-size: 40px; color: var(--roxo-principal);"></i>
                    <h3>Ver Mercados</h3>
                    <p style="font-size: 13px; color: var(--texto-cinza);">Encontre os melhores preços</p>
                </div>
            </div>
        </section>
    </main>

    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-tela-principal.js"></script>
</body>
</html>
