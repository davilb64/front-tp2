<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CarrinhoColetivo - Cadastro</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="logo">
        <img src="./logos/roxa sem fundo.png" alt="Logo CarrinhoColetivo">
        <h1>CarrinhoColetivo</h1>
    </div>

    <div id="form-cadastro">
        <form method="POST" id="form-registro">
            <h1>Cadastro de Usuário</h1>
            
            <div class="grupo-campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="grupo-campo"> 
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="grupo-campo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" minlength="8" required>
                <small style="color: #666; font-size: 12px;">Mínimo 8 caracteres.</small>
            </div>

            <div class="grupo-campo">
                <label for="confirmarSenha">Confirmar Senha:</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Repita a senha" required>
            </div>

            <button class="cadastrar-button" type="submit">Cadastrar</button>
        </form>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <a href="index.html" style="color: var(--roxo-principal); text-decoration: none; font-size: 14px; font-weight: 500;">
            ← Voltar para o Login
        </a>
    </div>
    
    <br>
    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-cadastro.js"></script>
</body>
</html>
