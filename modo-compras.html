<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Compras - CarrinhoColetivo</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style-main.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body style="background: var(--fundo-tela); padding-bottom: 80px;">

    <div class="header-compras">
        <button onclick="sairModoCompras()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.2s;">
            <i class="ph ph-arrow-left"></i>
        </button>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="./logos/branca sem fundo.png" alt="Logo" style="height: 22px; width: auto;">
                <h3 style="margin: 0; font-size: 18px; font-weight: 700;">CarrinhoColetivo</h3>
            </div>
            <small id="nomeMercadoHeader" style="font-size: 12px; opacity: 0.8; margin-top: 2px;">
                <i class="ph ph-storefront"></i> Carregando mercado...
            </small>
        </div>
        <div style="width: 24px;"></div> 
    </div>

    <div class="container" style="margin-top: 20px;">
        <div id="listaItensCompras">
            <p style="text-align: center; color: var(--texto-cinza); padding: 40px;">Carregando sua lista inteligente...</p>
        </div>
    </div>

    <div class="painel-total" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
        <div style="text-align: left;">
            <div style="font-size: 13px; font-weight: normal; opacity: 0.9;">Total Estimado</div>
            <div style="font-size: 24px;">R$ <span id="valorTotalCarrinho">0,00</span></div>
        </div>
        <button onclick="abrirModalFinalizar()" class="btn-customizado" style="background: white; color: #48bb78; max-width: 140px; padding: 10px; font-size: 15px; border: 2px solid white;">
            <i class="ph ph-check-circle"></i> Finalizar
        </button>
    </div>

    <!-- Modal de Preço Customizado -->
    <div id="modalPrecoItem" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h2 style="color: var(--roxo-principal); margin-bottom: 5px;">Confirmar Preço</h2>
            <p id="modalNomeProduto" style="color: var(--texto-cinza); font-size: 14px; margin-bottom: 20px;"></p>
            
            <input type="hidden" id="modalVariacaoId">
            <input type="hidden" id="modalItemId">

            <div class="form-group" style="text-align: left;">
                <label>Preço na prateleira (Unidade):</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 15px; top: 12px; color: var(--texto-cinza); font-weight: bold;">R$</span>
                    <input type="number" id="inputPrecoPrateleira" class="input-customizado" style="padding-left: 45px; font-size: 18px; font-weight: bold;" step="0.01" placeholder="0.00">
                </div>
                <small id="modalAvisoMedia" style="color: #dd6b20; display: none; margin-top: 5px;">
                    <i class="ph ph-warning-circle"></i> O valor acima é apenas uma média. Atualize com o valor real da etiqueta!
                </small>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="fecharModalPreco()" class="btn-secundario" style="flex: 1;">Pular</button>
                <button onclick="salvarPrecoModal()" class="btn-customizado" style="flex: 2; background: #48bb78; border-color: #48bb78;">
                    <i class="ph ph-check"></i> Salvar Preço
                </button>
            </div>
        </div>
        
    </div>
    <!-- Modal Finalizar Compra -->
    <div id="modalFinalizarCompra" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h2 style="color: #48bb78; margin-bottom: 5px;"><i class="ph ph-receipt"></i> Finalizar Compra</h2>
            <p style="color: var(--texto-cinza); font-size: 14px; margin-bottom: 20px;">
                Seu carrinho estimou <strong style="color: var(--texto-escuro);">R$ <span id="modalTotalEstimado">0,00</span></strong>. 
                Quanto deu o total real na notinha do caixa?
            </p>

            <div class="form-group" style="text-align: left;">
                <label>Total pago no caixa:</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 15px; top: 12px; color: var(--texto-cinza); font-weight: bold;">R$</span>
                    <input type="number" id="inputTotalPago" class="input-customizado" style="padding-left: 45px; font-size: 20px; font-weight: bold; color: #48bb78;" step="0.01">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button onclick="fecharModalFinalizar()" class="btn-secundario" style="flex: 1;">Voltar</button>
                <button onclick="confirmarPagamentoFinal()" class="btn-customizado" style="flex: 2; background: #48bb78; border-color: #48bb78;">
                    <i class="ph ph-confetti"></i> Confirmar Compra
                </button>
            </div>
        </div>
    </div>

    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-modo-compras.js"></script>
</body>
</html>
