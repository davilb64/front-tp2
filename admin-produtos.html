<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrinhoColetivo - Admin Produtos</title>
    <link rel="icon" type="image/x-icon" href="/logos/roxa sem fundo.svg">
    <link rel="stylesheet" href="style-main.css">
    <link rel="stylesheet" href="style-admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="./logos/branca sem fundo.png" alt="Logo CarrinhoColetivo">
                <h1>CarrinhoColetivo</h1>
            </div>
            <div class="user-actions">
                <a href="perfil.html" class="badge-pontos" id="perfil-usuario" style="text-decoration: none; cursor: pointer; transition: 0.2s;">
                    <i class="ph ph-user"></i> Carregando...
                </a>
            </div>
        </div>  
    </header>

    <main class="container">
        <nav class="nav-tabs">
            <a href="tela-principal.html" class="tab"><i class="ph ph-house"></i> Início</a>
            <a href="listas.html" class="tab"><i class="ph ph-list-checks"></i> Listas</a>
            <a href="mercados.html" class="tab"><i class="ph ph-storefront"></i> Mercados</a>
        </nav>

        <div class="grid-2colunas">
            <!-- Coluna Esquerda: Cadastro de Produtos -->
            <div class="card">
                <h2 class="card-title"><i class="ph ph-package"></i> Cadastrar Novo Produto</h2>
                
                <form id="formProduto" onsubmit="return false;">
                    <div class="form-group">
                        <label>Nome do Produto *</label>
                        <input type="text" id="prodNome" placeholder="Ex: Arroz Integral" class="input-customizado" required>
                    </div>

                    <div class="form-group">
                        <label>Código de Barras</label>
                        <input type="text" id="prodCodigo" placeholder="13 dígitos" class="input-customizado">
                    </div>

                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="prodCategoria" class="input-customizado">
                            <option value="">Selecione...</option>
                            <option value="alimentos">Alimentos</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="limpeza">Limpeza</option>
                            <option value="higiene">Higiene Pessoal</option>
                            <option value="eletronicos">Eletrônicos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Preço Médio (R$)</label>
                        <input type="number" id="prodPreco" placeholder="0.00" step="0.01" class="input-customizado">
                    </div>

                    <div class="form-group">
                        <label>Peso/Unidade</label>
                        <input type="text" id="prodPeso" placeholder="Ex: 1kg, 500ml, 100g" class="input-customizado">
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="prodDescricao" rows="3" placeholder="Descrição do produto..." class="input-customizado"></textarea>
                    </div>

                    <button onclick="cadastrarProduto()" class="btn-customizado" style="max-width: 100%;">
                        <i class="ph ph-check-circle"></i> Cadastrar Produto
                    </button>
                </form>
                
                <hr style="margin: 20px 0;">

                <h2 class="card-title"><i class="ph ph-storefront"></i> Cadastrar Mercado</h2>
                <div class="form-group">
                    <input type="text" id="novoNomeMercado" placeholder="Nome do Estabelecimento" class="input-customizado">
                </div>
                <button onclick="cadastrarMercadoDireto()" class="btn-customizado" style="max-width: 100%;">Cadastrar Mercado</button>
            </div>

            <!-- Coluna Direita: Gerenciamento -->
            <div>
                <!-- Produtos Pendentes de Aprovação (VAZIO PARA O JS) -->
                <div class="card">
                    <h2 class="card-title"><i class="ph ph-hourglass-high"></i> Pendentes de Aprovação</h2>
                    <div id="produtosPendentes">
                        <!-- O JS VAI INJETAR OS PENDENTES AQUI -->
                    </div>
                    <div id="mercadosPendentes" style="margin-top: 20px;">
                        <!-- JS INJETARÁ AQUI -->
                    </div>
                </div>

                <!-- Produtos Cadastrados (VAZIO PARA O JS) -->
                <div class="card">
                    <h2 class="card-title"><i class="ph ph-list-dashes"></i> Produtos no Catálogo</h2>
                    <div class="busca-admin">
                        <input type="text" id="buscaAdmin" placeholder="Buscar produto..." class="input-customizado">
                    </div>
                    <div id="catalogoProdutos">
                        <!-- O JS VAI INJETAR O CATÁLOGO AQUI -->
                    </div>
                </div>

                <!-- Estatísticas (ZERADAS PARA O JS) -->
                <div class="card">
                    <h2 class="card-title"><i class="ph ph-chart-bar"></i> Estatísticas</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-valor" id="stat-produtos">0</span>
                            <span class="stat-label">Produtos</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-valor" id="stat-pendentes">0</span>
                            <span class="stat-label">Pendentes</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="javascripts/config.js"></script>
    <script src="javascripts/script-admin.js"></script>
</body>
</html>
